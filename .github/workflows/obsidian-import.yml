name: Obsidian Import

env:
  OBSIDIAN_SOURCE_REPO: Taz-dingo/obsidian-vault

on:
  workflow_dispatch:
  schedule:
    - cron: "15 */8 * * *"

jobs:
  import:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      OBSIDIAN_SOURCE_TOKEN: ${{ secrets.OBSIDIAN_SOURCE_TOKEN }}
    steps:
      - name: Checkout blog repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Checkout Obsidian source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.OBSIDIAN_SOURCE_REPO }}
          token: ${{ env.OBSIDIAN_SOURCE_TOKEN }}
          path: .cache/obsidian-source
          fetch-depth: 0

      - name: Require private repo token
        if: ${{ env.OBSIDIAN_SOURCE_TOKEN == '' }}
        run: |
          echo "Missing OBSIDIAN_SOURCE_TOKEN secret for private repo access."
          exit 1

      - name: Run import pipeline
        env:
          OBSIDIAN_SOURCE_PATH: .cache/obsidian-source
        run: pnpm obsidian:import

      - name: Commit generated content
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ src/content/blog/imported/
          git commit -m "chore(blog): import obsidian notes"
          git push
