name: Obsidian Import

env:
  OBSIDIAN_SOURCE_REPO: Taz-dingo/obsidian-vault
  AI_REVIEW_ENABLED: "true"
  OPENAI_MODEL: gpt-5.4-mini
  OPENAI_BASE_URL: https://api-vip.codex-for.me/v1
  OPENAI_API_STYLE: responses

on:
  workflow_dispatch:
  schedule:
    - cron: "15 */8 * * *"

jobs:
  import:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      OBSIDIAN_SOURCE_TOKEN: ${{ secrets.OBSIDIAN_SOURCE_TOKEN }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: Checkout blog repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Checkout Obsidian source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.OBSIDIAN_SOURCE_REPO }}
          token: ${{ env.OBSIDIAN_SOURCE_TOKEN }}
          path: .cache/obsidian-source
          fetch-depth: 0

      - name: Require private repo token
        if: ${{ env.OBSIDIAN_SOURCE_TOKEN == '' }}
        run: |
          echo "Missing OBSIDIAN_SOURCE_TOKEN secret for private repo access."
          exit 1

      - name: Require OpenAI API key
        if: ${{ env.AI_REVIEW_ENABLED == 'true' && env.OPENAI_API_KEY == '' }}
        run: |
          echo "Missing OPENAI_API_KEY secret for AI review."
          exit 1

      - name: Scan changed notes
        env:
          OBSIDIAN_SOURCE_PATH: .cache/obsidian-source
        run: pnpm obsidian:scan:incremental

      - name: Smoke test AI API
        run: |
          set -euo pipefail
          RESPONSE_FILE="$(mktemp)"
          HTTP_CODE=$(
            curl -sS               -o "$RESPONSE_FILE"               -w "%{http_code}"               -X POST "${OPENAI_BASE_URL}/responses"               -H "Authorization: Bearer ${OPENAI_API_KEY}"               -H "Accept: application/json"               -H "Content-Type: application/json"               --data @- <<EOF
          {
            "model": "${OPENAI_MODEL}",
            "instructions": "Return raw JSON only.",
            "input": "Reply with {\"ok\":true}",
            "max_output_tokens": 50
          }
          EOF
          )
          echo "Smoke test HTTP: ${HTTP_CODE}"
          echo "Smoke test body bytes: $(wc -c < "$RESPONSE_FILE" | tr -d ' ')"
          echo "Smoke test body preview:"
          head -c 300 "$RESPONSE_FILE"
          echo
          test "$HTTP_CODE" -ge 200
          test "$HTTP_CODE" -lt 300
          test -s "$RESPONSE_FILE"

      - name: Review candidates with AI
        env:
          OBSIDIAN_SOURCE_PATH: .cache/obsidian-source
        run: pnpm obsidian:review:ai

      - name: Build approved drafts
        env:
          OBSIDIAN_SOURCE_PATH: .cache/obsidian-source
        run: pnpm obsidian:drafts

      - name: Commit generated content
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ src/content/blog/imported/
          git commit -m "chore(blog): import obsidian notes"
          git push
